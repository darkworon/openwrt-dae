stages:
  - test
  - package
  - image

variables:
  DEBIAN_FRONTEND: noninteractive
  OPENWRT_REPO: "https://github.com/openwrt/openwrt.git"
  OPENWRT_REF: "main"
  MT6000_OVERLAY_REPO: "https://github.com/darkworon/openwrt-mt6000.git"
  MT6000_OVERLAY_REF: "main"
  LUCI_APP_DAE_REPO: "https://github.com/darkworon/openwrt-mt6000-luci-app-dae.git"
  LUCI_APP_DAE_REF: "main"
  DAE_PKG_VERSION: "1.1.0-salamander"
  DAE_SOURCE_URL: "https://github.com/daeuniverse/dae.git"
  DAE_SOURCE_VERSION: "0a4de9d9a74477f62ed7c8e064d933f878cf2f39"
  DAE_SOURCE_DATE: "2026-05-06"
  DAE_OUTBOUND_REPO: "https://github.com/darkworon/outbound.git"
  DAE_OUTBOUND_REF: "stickyip-salamander"
  DAE_MIRROR_HASH: "skip"
  WORKDIR: "$CI_PROJECT_DIR/.work"
  CCACHE_DIR: "$CI_PROJECT_DIR/.work/ccache"

.debian-build:
  image: debian:bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends
      build-essential clang flex bison g++ gawk gcc-multilib g++-multilib
      gettext git libncurses-dev libssl-dev python3-setuptools rsync swig
      unzip zlib1g-dev file wget curl libelf-dev dwarves ca-certificates
      ccache xz-utils
    - update-ca-certificates
  cache:
    key: "$CI_PROJECT_NAME-openwrt"
    paths:
      - .work/ccache
      - .work/openwrt/staging_dir/host
      - .work/openwrt/staging_dir/hostpkg

shellcheck:
  stage: test
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck scripts/*.sh ci/*.sh

bash-syntax:
  stage: test
  image: bash:5.2
  script:
    - bash -n scripts/*.sh ci/*.sh

build-package:
  stage: package
  extends: .debian-build
  timeout: 6h
  script:
    - ci/build-openwrt.sh package
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - .work/openwrt/bin/packages/
      - .work/openwrt/bin/targets/mediatek/filogic/packages/

build-image:
  stage: image
  extends: .debian-build
  timeout: 8h
  rules:
    - if: '$BUILD_IMAGE == "1"'
      when: on_success
    - when: manual
      allow_failure: true
  script:
    - ci/build-openwrt.sh image
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - .work/openwrt/bin/packages/
      - .work/openwrt/bin/targets/
